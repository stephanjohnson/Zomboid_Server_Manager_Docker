services:
  # ---------------------------------------------------------------------------
  # PZ Game Server — Dedicated server via SteamCMD
  # Image and arch-specific config provided by docker-compose.{arm64,amd64}.yml
  # ---------------------------------------------------------------------------
  game-server:
    container_name: ${GAME_SERVER_CONTAINER_NAME:-pz-game-server}
    restart: unless-stopped
    ports:
      - "${PZ_GAME_PORT:-16261}:${PZ_GAME_PORT:-16261}/udp"
      - "${PZ_DIRECT_PORT:-16262}:${PZ_DIRECT_PORT:-16262}/udp"
    volumes:
      - zomboid-data:/home/steam/Zomboid
    networks:
      - zomboid-net

  # ---------------------------------------------------------------------------
  # Laravel Application — API + Web Dashboard
  # ---------------------------------------------------------------------------
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: pz-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - zomboid-data:/pz-data:ro
      - backup-data:/backups
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      APP_NAME: ${APP_NAME:-PZ Server Manager}
      APP_ENV: ${APP_ENV:-production}
      APP_KEY: ${APP_KEY:-}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_URL: ${APP_URL:-http://localhost:8000}
      DB_CONNECTION: ${DB_CONNECTION:-pgsql}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5432}
      DB_DATABASE: ${DB_DATABASE:-zomboid}
      DB_USERNAME: ${DB_USERNAME:-zomboid}
      DB_PASSWORD: ${DB_PASSWORD:-zomboid}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-null}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-redis}
      CACHE_STORE: ${CACHE_STORE:-redis}
      SESSION_DRIVER: ${SESSION_DRIVER:-redis}
      API_KEY: ${API_KEY:-}
      GAME_SERVER_CONTAINER_NAME: ${GAME_SERVER_CONTAINER_NAME:-pz-game-server}
      PZ_DATA_PATH: /pz-data
      PZ_SERVER_NAME: ${PZ_SERVER_NAME:-ZomboidServer}
      PZ_RCON_HOST: game-server
      PZ_RCON_PORT: ${PZ_RCON_PORT:-27015}
      PZ_RCON_PASSWORD: ${PZ_RCON_PASSWORD:-changeme}
      BACKUP_PATH: /backups
      TZ: ${TZ:-Asia/Tbilisi}
    networks:
      - zomboid-net
      - backend-net

  # ---------------------------------------------------------------------------
  # Queue Worker — Processes backup jobs, restart jobs, etc.
  # ---------------------------------------------------------------------------
  queue:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: pz-queue
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: php artisan queue:work redis --tries=3 --timeout=300 --sleep=3
    volumes:
      - zomboid-data:/pz-data:ro
      - backup-data:/backups
    environment:
      APP_NAME: ${APP_NAME:-PZ Server Manager}
      APP_ENV: ${APP_ENV:-production}
      APP_KEY: ${APP_KEY:-}
      APP_DEBUG: ${APP_DEBUG:-false}
      DB_CONNECTION: ${DB_CONNECTION:-pgsql}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5432}
      DB_DATABASE: ${DB_DATABASE:-zomboid}
      DB_USERNAME: ${DB_USERNAME:-zomboid}
      DB_PASSWORD: ${DB_PASSWORD:-zomboid}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-null}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-redis}
      CACHE_STORE: ${CACHE_STORE:-redis}
      PZ_DATA_PATH: /pz-data
      PZ_SERVER_NAME: ${PZ_SERVER_NAME:-ZomboidServer}
      PZ_RCON_HOST: game-server
      PZ_RCON_PORT: ${PZ_RCON_PORT:-27015}
      PZ_RCON_PASSWORD: ${PZ_RCON_PASSWORD:-changeme}
      BACKUP_PATH: /backups
      TZ: ${TZ:-Asia/Tbilisi}
    networks:
      - zomboid-net
      - backend-net

  # ---------------------------------------------------------------------------
  # PostgreSQL — Primary database
  # ---------------------------------------------------------------------------
  db:
    image: postgres:16-alpine
    container_name: pz-db
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${DB_DATABASE:-zomboid}
      POSTGRES_USER: ${DB_USERNAME:-zomboid}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-zomboid}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-zomboid} -d ${DB_DATABASE:-zomboid}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend-net

  # ---------------------------------------------------------------------------
  # Redis — Queue, cache, rate limiting
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: pz-redis
    restart: unless-stopped
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backend-net

# -----------------------------------------------------------------------------
# Networks
# -----------------------------------------------------------------------------
networks:
  zomboid-net:
    driver: bridge
    # Not internal — game-server needs internet for SteamCMD + Steam master servers
    # RCON security: port not published to host, only accessible between containers
  backend-net:
    driver: bridge
    internal: true
    # Internal — db and redis never accessible from host or internet

# -----------------------------------------------------------------------------
# Volumes
# -----------------------------------------------------------------------------
volumes:
  zomboid-server:
    name: pz-server-files
  zomboid-data:
    name: pz-data
  postgres-data:
    name: pz-postgres
  redis-data:
    name: pz-redis
  backup-data:
    name: pz-backups
